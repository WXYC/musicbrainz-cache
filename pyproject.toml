[tool.pytest.ini_options]
markers = [
    "postgres: needs PostgreSQL (gated by DATABASE_URL_TEST)",
    "slow: marks tests as slow (perf benchmarks)",
]
# Default unit run excludes the postgres-tagged integration tests and the slow
# perf benchmark. The CI test-python job re-selects `postgres` explicitly.
# `slow` is opt-in for local perf runs only.
# ci-sync-skip: slow reason: perf benchmark, run on demand only (not in CI)
addopts = "-m 'not postgres and not slow'"
testpaths = ["tests"]
