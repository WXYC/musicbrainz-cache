name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout wxyc-etl at expected relative path
        run: git clone --depth 1 https://github.com/WXYC/wxyc-etl.git "$GITHUB_WORKSPACE/../../../wxyc-etl"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings -A clippy::manual_is_multiple_of

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout wxyc-etl at expected relative path
        run: git clone --depth 1 https://github.com/WXYC/wxyc-etl.git "$GITHUB_WORKSPACE/../../../wxyc-etl"
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests (incl. local HTTP download tests)
        env:
          TEST_DOWNLOAD: "1"
        run: cargo test

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: musicbrainz
          POSTGRES_PASSWORD: musicbrainz
          POSTGRES_DB: musicbrainz
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U musicbrainz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Checkout wxyc-etl at expected relative path
        run: git clone --depth 1 https://github.com/WXYC/wxyc-etl.git "$GITHUB_WORKSPACE/../../../wxyc-etl"
      - uses: dtolnay/rust-toolchain@stable
      - name: Enable extensions
        run: |
          PGPASSWORD=musicbrainz psql -h localhost -p 5434 -U musicbrainz -d musicbrainz \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS unaccent;"
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://musicbrainz:musicbrainz@localhost:5434/musicbrainz
          TEST_DATABASE_URL: postgresql://musicbrainz:musicbrainz@localhost:5434/postgres
        run: cargo test -- --ignored --test-threads=1

  test-python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: musicbrainz
          POSTGRES_PASSWORD: musicbrainz
          POSTGRES_DB: musicbrainz
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U musicbrainz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and install wxyc-etl Python wheel
        run: |
          pip install maturin
          git clone --depth 1 https://github.com/WXYC/wxyc-etl.git /tmp/wxyc-etl
          cd /tmp/wxyc-etl/wxyc-etl-python && maturin build --release && pip install /tmp/wxyc-etl/target/wheels/*.whl
      - name: Install Python test dependencies
        run: pip install pytest psycopg[binary]
      - name: Enable extensions
        run: |
          PGPASSWORD=musicbrainz psql -h localhost -p 5434 -U musicbrainz -d musicbrainz \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS unaccent;"
      - name: Run Python unit tests
        run: pytest tests/unit/ -v
      - name: Run Python integration tests (postgres-marked)
        env:
          DATABASE_URL_TEST: postgresql://musicbrainz:musicbrainz@localhost:5434/postgres
        run: pytest tests/integration/ -v -m "postgres"

  marker-sync:
    uses: WXYC/wxyc-etl/.github/workflows/check-ci-marker-sync.yml@main
    with:
      repo-path: "."
      workflows-dir: ".github/workflows"
      tests-dir: "tests"
