services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-musicbrainz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musicbrainz}
      POSTGRES_DB: ${POSTGRES_DB:-musicbrainz}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - work_mem=64MB
      - -c
      - wal_buffers=64MB
      - -c
      - checkpoint_completion_target=0.9
    shm_size: 1g
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-musicbrainz}"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
